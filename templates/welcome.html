<!DOCTYPE html>
<html>
<head>
    <title>Fleet Manager - Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #ecf0f1;">

<div style="text-align: center; margin-bottom: 40px;">
    <h1 style="font-size: 3rem; color: #2c3e50; margin-bottom: 10px;">Fleet Rental Manager 🚚</h1>
    <p style="font-size: 1.2rem; color: #7f8c8d;">Select your portal below to continue</p>
</div>

<div style="display: flex; gap: 30px;">

    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center;">
        <h2 style="color: #2980b9;">Customer Portal</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Browse our available vehicles, view daily pricing, and book your next rental.</p>
        <a href="/catalog" style="background-color: #3498db; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: block;">View Fleet & Prices</a>
    </div>

    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center;">
        <h2 style="color: #2c3e50;">Owner Dashboard</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Manage your fleet inventory, track active rentals, and monitor live statistics.</p>
        <a href="/login" style="background-color: #2c3e50; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: block;">Owner Login</a>
    </div>

</div>

</body>
</html>
