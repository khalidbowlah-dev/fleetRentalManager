<!DOCTYPE html>
<html>
<head>
    <title>Fleet Rental Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="font-family: Arial, sans-serif; background-color: #eef2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;">

<div style="text-align: center; margin-bottom: 40px;">
    <h1 style="color: #2c3e50; font-size: 3em; margin-bottom: 10px;">Fleet Rental Manager 🚚</h1>
    <hr style="border: 2px solid #3498db; width: 100%; margin-bottom: 20px;">
    <p style="color: #7f8c8d; font-size: 1.2em;">Select your portal below to continue</p>
</div>

<div style="display: flex; gap: 30px; max-width: 900px; width: 100%; justify-content: center;">

    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; text-align: center; max-width: 400px;">
        <h2 style="color: #3498db; margin-bottom: 20px;">Customer Portal</h2>
        <p style="color: #7f8c8d; margin-bottom: 40px; line-height: 1.6;">Browse our available vehicles, view daily pricing, and book your next rental.</p>

        <a href="/catalog" style="display: block; background-color: #3498db; color: white; padding: 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px;">View Fleet & Prices</a>
    </div>

    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; text-align: center; max-width: 400px;">
        <h2 style="color: #2c3e50; margin-bottom: 20px;">Owner Dashboard</h2>
        <p style="color: #7f8c8d; margin-bottom: 40px; line-height: 1.6;">Manage your fleet inventory, track active rentals, and monitor live statistics.</p>

        <a href="/login_owner" style="display: block; background-color: #2c3e50; color: white; padding: 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px;">Owner Login</a>
    </div>

</div>

</body>
</html>
