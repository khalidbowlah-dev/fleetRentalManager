<!DOCTYPE html>
<html>
<head>
    <title>Fleet Manager - Customer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="font-family: Arial, sans-serif; background-color: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

<div style="background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
    <h2 style="color: #2c3e50; text-align: center; margin-bottom: 20px;">Customer Portal Login</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <p style="color: red; font-weight: bold; text-align: center;">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}

    <form action="/login_customer" method="POST">
        <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: bold;">Username:</label>
        <input type="text" name="username" autocomplete="off" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px;">

        <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: bold;">Password:</label>
        <input type="password" name="password" autocomplete="off" required style="width: 100%; padding: 12px; margin-bottom: 25px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px;">

        <button type="submit" style="background-color: #3498db; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;">Login to Catalog</button>
    </form>

    <br>
    <p style="text-align: center; margin-top: 20px; color: #7f8c8d;">
        Don't have an account? <br><br>
        <a href="/register_customer" style="color: #3498db; text-decoration: none; font-weight: bold;">Register as Customer</a>
    </p>
</div>
</body>
</html>
