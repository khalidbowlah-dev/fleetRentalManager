<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Manager - Owner Registration</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

<div style="background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
    <h2 style="color: #2c3e50; text-align: center; margin-bottom: 20px;">Create Owner Account</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div style="color: #e74c3c; background-color: #fadbd8; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-weight: bold;">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form action="/register_owner" method="POST">
        <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: bold;">Username:</label>
        <input type="text" name="username" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px;">

        <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: bold;">Password:</label>
        <input type="password" name="password" required style="width: 100%; padding: 12px; margin-bottom: 25px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 16px;">

        <button type="submit" style="background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;">Register as Owner</button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #7f8c8d;">
        Already have an account? <a href="/login" style="color: #3498db; text-decoration: none; font-weight: bold;">Log in here</a>.
    </p>
</div>

</body>
</html>
