<!DOCTYPE html>
<html>
<head>
    <title>Fleet Manager - Add Truck</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>Add New Vehicle to Fleet</h1>

<form action="/add_truck" method="POST">
    <label>Vehicle Specification / Model:</label>
    <input type="text" name="model" placeholder="e.g., GMC Sierra HD, BYD Leopard" required>

    <label>Daily Rental Rate ($):</label>
    <input type="number" name="daily_rate" step="0.01" placeholder="e.g., 150.00" required>

    <button type="submit">Publish Vehicle Listing</button>
</form>

<br>
<a href="/">Cancel and Return Home</a>
</body>
</html>
