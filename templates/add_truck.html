<!DOCTYPE html>
<html>
<head>
    <title>Fleet Manager - Add Vehicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>Add New Vehicle to Fleet</h1>

<div style="background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px;">
    <form action="/add_truck" method="POST">
        <label style="display: block; margin-bottom: 8px; color: #2c3e50;">Vehicle Specification / Model:</label>
        <input type="text" name="model" placeholder="e.g., GMC Sierra HD, BYD Leopard" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 8px; color: #2c3e50;">Daily Rental Rate ($):</label>
        <input type="number" step="0.01" name="daily_rate" placeholder="e.g., 150.00" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box;">

        <button type="submit" style="background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Publish Vehicle Listing</button>
    </form>
</div>

<br>
<a href="/dashboard" style="color: #3498db; text-decoration: none;">Cancel and Return to Dashboard</a>
</body>
</html>
